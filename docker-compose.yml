services:
  # Ambiente de Produção (com build Node e Nginx)
  web:
    build:
       context: .
       dockerfile: Dockerfile
    container_name: app_oliveirai_prod
    ports:
      - "5005:80"
    restart: always
    profiles: ["prod"]

  # Ambiente de Desenvolvimento (com Hot Reload)
  dev:
    image: node:20-alpine
    container_name: app_oliveirai_dev
    working_dir: /app
    volumes:
      - ./app:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles: ["dev"]
