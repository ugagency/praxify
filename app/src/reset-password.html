<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha - PRAXIFY</title>

    <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d9ff;
            --bg: #0a0e27;
            --card: #141829;
            --text: #f0f4f8;
            --text-muted: #a0aec0;
            --border: #1e293b;
            --gradient: linear-gradient(135deg, #00d9ff 0%, #10b981 100%);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, rgba(0, 217, 255, 0.15) 0%, transparent 70%);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            font-size: 14px;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(20, 24, 41, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 1.25rem; }

        .login-brand {
            width: 44px;
            height: 44px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: #0a0e27;
            font-family: 'Clash Grotesk', sans-serif;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .login-title {
            margin: 0;
            font-size: 1.35rem;
            color: var(--text);
            font-family: 'Clash Grotesk', sans-serif;
            font-weight: 600;
        }

        .login-subtitle { margin: 0.75rem 0 0 0; font-size: 1rem; color: var(--text-muted); }

        .login-form { display: flex; flex-direction: column; gap: 1rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

        .form-group label { font-weight: 500; font-size: 0.9rem; color: var(--text); }

        .form-group input {
            padding: 0.65rem 0.85rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .login-btn {
            padding: 0.75rem;
            background: var(--primary);
            color: #0a0e27;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            font-family: 'Clash Grotesk', sans-serif;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
            width: 100%;
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 217, 255, 0.4); background-color: #33e1ff; }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-footer { text-align: center; margin-top: 1.25rem; font-size: 0.8rem; color: var(--text-muted); }

        .login-footer a { color: var(--primary); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .login-footer a:hover { color: #33e1ff; text-decoration: underline; }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            display: none;
            margin-bottom: 1rem;
        }

        .error-message.show { display: block; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-10px); }
            75%       { transform: translateX(10px); }
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-brand">OA</div>
                <h2 class="login-title">Redefinir Senha</h2>
                <p class="login-subtitle">Informe sua nova senha abaixo</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form class="login-form" id="reset-form">
                <div class="form-group">
                    <label for="password">Nova Senha</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required />
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirmar Nova Senha</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required />
                </div>

                <button type="submit" class="login-btn" id="reset-btn">
                    Atualizar Senha
                </button>
            </form>

            <div class="login-footer">
                <p><a href="/src/login.html" id="back-login">Voltar para o Login</a></p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vudeavjgkdlijxsjnaxz.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1ZGVhdmpna2RsaWp4c2puYXh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MTI2ODUsImV4cCI6MjA4MDE4ODY4NX0.KqKXC3abgtFT-D1JufIEj0rmMFkwUaIMdxDSq-vLPxc";

        window.addEventListener('DOMContentLoaded', function () {
            const { createClient } = supabase;
            const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const form = document.getElementById('reset-form');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm-password');
            const resetBtn = document.getElementById('reset-btn');
            const errorMsg = document.getElementById('error-message');

            function showError(message) {
                errorMsg.style.background = 'rgba(220, 38, 38, 0.1)';
                errorMsg.style.borderColor = 'rgba(220, 38, 38, 0.3)';
                errorMsg.style.color = '#f87171';
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 5000);
            }

            function showSuccess(message) {
                errorMsg.style.background = 'rgba(16, 185, 129, 0.1)';
                errorMsg.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                errorMsg.style.color = '#34d399';
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
            }

            function hideError() {
                errorMsg.classList.remove('show');
            }

            // Detectar evento de recuperação de senha pelo hash
            client.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    console.log('Modo de recuperação ativado');
                }
            });

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                hideError();

                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (!password || !confirmPassword) { 
                    showError('Preencha os dois campos de senha.'); 
                    return; 
                }

                if (password.length < 6) { 
                    showError('Sua senha deve ter no mínimo 6 caracteres.'); 
                    return; 
                }

                if (password !== confirmPassword) {
                    showError('As senhas não coincidem.');
                    return;
                }

                resetBtn.disabled = true;
                resetBtn.textContent = 'Atualizando...';

                try {
                    const { error } = await client.auth.updateUser({
                        password: password
                    });

                    if (error) throw error;

                    showSuccess('Senha atualizada com sucesso! Redirecionando...');
                    
                    setTimeout(() => {
                        window.location.href = '/src/login.html';
                    }, 2000);

                } catch (error) {
                    let errorMessage = 'Ocorreu um erro. Verifique se o link não expirou.';
                    if (error.message) {
                        errorMessage = error.message;
                    }
                    showError(errorMessage);
                    resetBtn.disabled = false;
                    resetBtn.textContent = 'Atualizar Senha';
                }
            });
        });
    </script>
</body>

</html>
