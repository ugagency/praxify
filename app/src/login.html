<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PRAXIFY</title>

    <!-- Font Inter & Clash Grotesk -->
    <link href="https://api.fontshare.com/v2/css?f[]=clash-grotesk@400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d9ff;
            --bg: #0a0e27;
            --card: #141829;
            --text: #f0f4f8;
            --text-muted: #a0aec0;
            --border: #1e293b;
            --gradient: linear-gradient(135deg, #00d9ff 0%, #10b981 100%);
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, rgba(0, 217, 255, 0.15) 0%, transparent 70%);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            font-size: 14px;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(20, 24, 41, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-header { text-align: center; margin-bottom: 1.25rem; }

        .login-brand {
            width: 44px;
            height: 44px;
            background: var(--gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.25rem;
            font-weight: bold;
            color: #0a0e27;
            font-family: 'Clash Grotesk', sans-serif;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .login-title {
            margin: 0;
            font-size: 1.35rem;
            color: var(--text);
            font-family: 'Clash Grotesk', sans-serif;
            font-weight: 600;
        }

        .login-subtitle { margin: 0.75rem 0 0 0; font-size: 1rem; color: var(--text-muted); }

        .login-form { display: flex; flex-direction: column; gap: 1rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }

        .form-group label { font-weight: 500; font-size: 0.9rem; color: var(--text); }

        .form-group input {
            padding: 0.65rem 0.85rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-size: 1rem;
            color: var(--text);
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .login-btn {
            padding: 0.75rem;
            background: var(--primary);
            color: #0a0e27;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            font-family: 'Clash Grotesk', sans-serif;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(0, 217, 255, 0.4); background-color: #33e1ff; }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-footer { text-align: center; margin-top: 1.25rem; font-size: 0.8rem; color: var(--text-muted); }

        .login-footer a { color: var(--primary); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .login-footer a:hover { color: #33e1ff; text-decoration: underline; }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #f87171;
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            display: none;
            margin-bottom: 1rem;
        }

        .error-message.show { display: block; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-10px); }
            75%       { transform: translateX(10px); }
        }
    </style>

    <!-- Supabase SDK e SweetAlert2 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-brand">OA</div>
                <h2 class="login-title">Bem-vindo ao PRAXIFY</h2>
                <p class="login-subtitle">Paralegal Digital</p>
            </div>

            <div class="error-message" id="error-message"></div>

            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" />
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="login-btn" id="login-btn" style="flex: 1;">
                        Entrar
                    </button>
                    <button type="button" class="login-btn" id="register-btn"
                        style="flex: 1; background: transparent; border: 1px solid var(--primary); color: var(--primary);">
                        Criar Conta
                    </button>
                </div>
            </form>

            <div class="login-footer">
                <p>Esqueceu sua senha? <a href="#" id="forgot-password">Recuperar</a></p>
                <p style="margin-top: 0.5rem;">
                    <small>Sistema Online · v1.0.0</small>
                </p>
            </div>
        </div>
    </div>

    <script>
        // =============================================
        // LOGIN STANDALONE - Usa SDK Supabase via CDN
        // Não depende de módulos TypeScript (não processados em produção)
        // =============================================

        const SUPABASE_URL = "https://vudeavjgkdlijxsjnaxz.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1ZGVhdmpna2RsaWp4c2puYXh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2MTI2ODUsImV4cCI6MjA4MDE4ODY4NX0.KqKXC3abgtFT-D1JufIEj0rmMFkwUaIMdxDSq-vLPxc";

        // Aguardar o SDK antes de inicializar
        window.addEventListener('DOMContentLoaded', function () {
            const { createClient } = supabase;
            const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const form = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('login-btn');
            const registerBtn = document.getElementById('register-btn');
            const errorMsg = document.getElementById('error-message');
            const forgotPasswordLink = document.getElementById('forgot-password');

            function showError(message) {
                errorMsg.style.background = 'rgba(220, 38, 38, 0.1)';
                errorMsg.style.borderColor = 'rgba(220, 38, 38, 0.3)';
                errorMsg.style.color = '#f87171';
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 5000);
            }

            function showSuccess(message) {
                errorMsg.style.background = 'rgba(16, 185, 129, 0.1)';
                errorMsg.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                errorMsg.style.color = '#34d399';
                errorMsg.textContent = message;
                errorMsg.classList.add('show');
            }

            function hideError() {
                errorMsg.classList.remove('show');
            }

            // REGISTER
            registerBtn.addEventListener('click', async function (e) {
                e.preventDefault();
                hideError();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) { showError('Preencha email e senha para criar conta'); return; }
                if (password.length < 6) { showError('Senha deve ter no mínimo 6 caracteres'); return; }

                registerBtn.disabled = true;
                registerBtn.textContent = 'Criando...';

                try {
                    const { error } = await client.auth.signUp({
                        email, password,
                        options: { data: { role: 'ADVOGADO', nome: email.split('@')[0] } }
                    });
                    if (error) throw error;

                    showSuccess('Conta criada! Fazendo login...');

                    const { error: loginError } = await client.auth.signInWithPassword({ email, password });
                    if (loginError) throw loginError;

                    window.location.href = '/src/index.html';
                } catch (err) {
                    let msg = err.message || 'Erro ao criar conta';
                    if (msg.includes('rate limit')) msg = 'Bloqueio temporário: aguarde um momento.';
                    else if (msg.includes('already registered') || msg.includes('already been registered')) msg = 'Este email já possui conta. Tente fazer Login.';
                    else if (msg.includes('Password')) msg = 'A senha é muito fraca ou curta.';
                    showError(msg);
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Criar Conta';
                }
            });

            // LOGIN
            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                hideError();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) { showError('Por favor, informe suas credenciais'); return; }

                loginBtn.disabled = true;
                loginBtn.textContent = 'Entrando...';

                try {
                    const { error } = await client.auth.signInWithPassword({ email, password });
                    if (error) throw error;

                    window.location.href = '/src/index.html';
                } catch (error) {
                    let errorMessage = 'Erro ao fazer login. Tente novamente.';
                    if (error.message.includes('Invalid login credentials')) errorMessage = 'Email ou senha incorretos';
                    else if (error.message.includes('Email not confirmed')) errorMessage = 'Confirme seu email antes de fazer login';

                    showError(errorMessage);
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Entrar';
                }
            });

            // RECUPERAR SENHA
            forgotPasswordLink.addEventListener('click', function (e) {
                e.preventDefault();
                Swal.fire({
                    title: 'Atenção',
                    text: 'Funcionalidade de recuperação de senha em desenvolvimento.\n\nEntre em contato com o administrador do sistema.',
                    icon: 'info',
                    background: '#0b1220',
                    color: '#f0f4f8',
                    confirmButtonColor: '#00d9ff'
                });
            });

            emailInput.focus();
        });
    </script>
</body>

</html>
